
name           = "StrongPNT"
version        = "0.1.0"
defaultTargets = ["StrongPNT"]

[leanOptions]
pp.unicode.fun         = true
autoImplicit           = false
relaxedAutoImplicit    = false
linter.mathlibStandardSet = true
linter.style.header = false
linter.style.longLine = false
linter.style.emptyLine = false

[[lean_lib]]
name = "StrongPNT"

[[require]]
name  = "mathlib"
scope = "leanprover-community"
rev   = "db127794c79fdeb86f6b0cf6ff2c804026fbaff1"

[[require]]
name = "PrimeNumberTheoremAnd"
git  = "https://github.com/AlexKontorovich/PrimeNumberTheoremAnd.git"
rev  = "837b0d6a0cd1e4f5f16b89030fabc9134f5f3563"

[[require]]
name = "checkdecls"
git  = "https://github.com/PatrickMassot/checkdecls.git"
