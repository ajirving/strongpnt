
name           = "StrongPNT"
version        = "0.1.0"
defaultTargets = ["StrongPNT"]

[leanOptions]
pp.unicode.fun         = true
autoImplicit           = false
relaxedAutoImplicit    = false
linter.unusedSimpArgs = false

[[lean_lib]]
name = "StrongPNT"

[[require]]
name  = "mathlib"
scope = "leanprover-community"
rev   = "v4.30.0"

[[require]]
name = "PrimeNumberTheoremAnd"
git  = "https://github.com/AlexKontorovich/PrimeNumberTheoremAnd.git"
rev  = "v4.30.0"

[[require]]
name = "checkdecls"
git  = "https://github.com/PatrickMassot/checkdecls.git"
